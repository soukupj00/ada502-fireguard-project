repos:
  # --- Backend & Intelligence System (Python) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4 # Run 'pre-commit autoupdate' to get the latest
    hooks:
      # Linter: Fixes unused imports, etc.
      - id: ruff
        args: [ --fix ]
      # Formatter: Applies standard formatting
      - id: ruff-format

  # --- Frontend (Node.js / React) ---
  - repo: local
    hooks:
      # 1. Formatter (e.g., Prettier)
      - id: frontend-format
        name: Frontend Format
        entry: bash -c 'cd frontend && npm run format'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css)$
        pass_filenames: false

      # 2. Linter (ESLint)
      - id: frontend-lint
        name: Frontend Lint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      # 3. Typechecker (TypeScript)
      - id: frontend-typecheck
        name: Frontend Typecheck
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false