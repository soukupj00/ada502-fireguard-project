apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: hivemq
  name: hivemq
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: hivemq
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: hivemq
    spec:
      containers:
        - name: hivemq
          image: hivemq/hivemq-ce:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1883
              protocol: TCP
            - containerPort: 8000
              protocol: TCP
          volumeMounts:
            - mountPath: /opt/hivemq/data
              name: hivemq-data-dev
      restartPolicy: Always
      volumes:
        - name: hivemq-data-dev
          persistentVolumeClaim:
            claimName: hivemq-data-dev
