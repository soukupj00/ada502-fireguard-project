services:
  # 1. PostgreSQL Database for Application Data
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-fireguard_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-fireguard_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2 PostgreSQL Database for Keycloak
  keycloak_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${KC_POSTGRES_USER:-keycloak_user}
      POSTGRES_PASSWORD: ${KC_POSTGRES_PASSWORD:-keycloak_password}
      POSTGRES_DB: ${KC_POSTGRES_DB:-keycloak_db}
    ports:
      - "5434:5432" # Expose on a different port to avoid conflicts
    volumes:
      - keycloak_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_POSTGRES_USER:-keycloak_user} -d ${KC_POSTGRES_DB:-keycloak_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Redis
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6380}:6379" # Local-only mapping avoids 6379 host conflicts
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. HiveMQ MQTT Broker (NEW)
  hivemq:
    image: hivemq/hivemq-ce:latest
    restart: always
    ports:
      - "127.0.0.1:${MQTT_HOST_PORT:-1883}:1883" # Local-only mapping for MQTT clients in development
      - "127.0.0.1:${MQTT_WS_HOST_PORT:-8081}:8000" # Local-only mapping for HiveMQ web UI/WebSocket
    volumes:
      - hivemq_data_dev:/opt/hivemq/data
      - ./intelligence-system/hivemq/extensions/hivemq-file-rbac-extension:/opt/hivemq/extensions/hivemq-file-rbac-extension:ro
      - ./intelligence-system/hivemq/extensions/hivemq-allow-all-extension/DISABLED:/opt/hivemq/extensions/hivemq-allow-all-extension/DISABLED:ro
      - ./intelligence-system/hivemq/certs:/opt/hivemq/certs:ro

  # 5. FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      hivemq:
        condition: service_started
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://user:password@db:5432/fireguard_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-mqtt://hivemq:1883}
      MQTT_TEST_MODE: ${MQTT_TEST_MODE:-true}
      HIVEMQ_HOST: ${HIVEMQ_HOST:-hivemq}
      HIVEMQ_PORT: ${HIVEMQ_PORT:-1883}
      HIVEMQ_USERNAME: ${HIVEMQ_USERNAME:-}
      HIVEMQ_PASSWORD: ${HIVEMQ_PASSWORD:-}
      HIVEMQ_USE_TLS: ${HIVEMQ_USE_TLS:-false}
      HIVEMQ_CA_CERT: ${HIVEMQ_CA_CERT:-}
      HIVEMQ_CLIENT_CERT: ${HIVEMQ_CLIENT_CERT:-}
      HIVEMQ_CLIENT_KEY: ${HIVEMQ_CLIENT_KEY:-}
      HIVEMQ_TLS_INSECURE: ${HIVEMQ_TLS_INSECURE:-false}
      THINGSPEAK_WRITE_API_KEY: ${THINGSPEAK_WRITE_API_KEY}
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
        - action: rebuild
          path: ./backend/pyproject.toml

  # 6. Intelligence System (The Worker)
  intelligence:
    build:
      context: ./intelligence-system
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://user:password@db:5432/fireguard_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-mqtt://hivemq:1883}
    develop:
      watch:
        - action: sync
          path: ./intelligence-system/src
          target: /app/src
        - action: rebuild
          path: ./intelligence-system/pyproject.toml

  # 7. React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_MQTT_BROKER_URL: ${VITE_MQTT_BROKER_URL}
        VITE_MQTT_USERNAME: ${VITE_MQTT_USERNAME}
        VITE_MQTT_PASSWORD: ${VITE_MQTT_PASSWORD}
        VITE_THINGSPEAK_CHANNEL_ID: ${VITE_THINGSPEAK_CHANNEL_ID}
        VITE_THINGSPEAK_READ_API_KEY: ${VITE_THINGSPEAK_READ_API_KEY}
    ports:
      - "5173:5173"
    env_file:
      - ./.env # Load variables from root .env file
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      # Prevent node_modules from being overwritten by the host
      - /app/node_modules

  # 8. Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      # Database Configuration
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/${KC_POSTGRES_DB:-keycloak_db}
      KC_DB_USERNAME: ${KC_POSTGRES_USER:-keycloak_user}
      KC_DB_PASSWORD: ${KC_POSTGRES_PASSWORD:-keycloak_password}
      # Initial Admin Credentials
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Fix for modern Keycloak behind proxies/Docker
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      # Forces Keycloak to serve from /auth/ to match production
      KC_HTTP_RELATIVE_PATH: /auth/
      # Tells Keycloak it might be accessed via a proxy (Vite)
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "8080:8080"
    depends_on:
      keycloak_db:
        condition: service_healthy

volumes:
  postgres_data_dev:
  keycloak_data_dev:
  hivemq_data_dev:
