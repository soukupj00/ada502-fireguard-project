services:
  # 1. PostgreSQL Database for Application Data
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fireguard_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d fireguard_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2 PostgreSQL Database for Keycloak
  keycloak_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: keycloak_user
      POSTGRES_PASSWORD: keycloak_password
      POSTGRES_DB: keycloak_db
    ports:
      - "5434:5432" # Expose on a different port to avoid conflicts
    volumes:
      - keycloak_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak_user -d keycloak_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Redis
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379" # Expose in dev so you can inspect it with RedisInsight/CLI

  # 4. FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/fireguard_db
      REDIS_URL: redis://redis:6379/0
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
        - action: rebuild
          path: ./backend/pyproject.toml

  # 5. Intelligence System (The Worker)
  intelligence:
    build:
      context: ./intelligence-system
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/fireguard_db
      REDIS_URL: redis://redis:6379/0
    develop:
      watch:
        - action: sync
          path: ./intelligence-system/src
          target: /app/src
        - action: rebuild
          path: ./intelligence-system/pyproject.toml

  # 6. React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_KEYCLOAK_URL=http://localhost:8080/auth
    depends_on:
      - backend
    # ADD THIS SECTION BELOW:
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      # Prevent node_modules from being overwritten by the host
      - /app/node_modules

  # 7. Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      # Database Configuration
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password
      # Initial Admin Credentials
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Fix for modern Keycloak behind proxies/Docker
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      # Forces Keycloak to serve from /auth/ to match production
      KC_HTTP_RELATIVE_PATH: /auth/
      # Tells Keycloak it might be accessed via a proxy (Vite)
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "8080:8080"
    depends_on:
      keycloak_db:
        condition: service_healthy

volumes:
  postgres_data_dev:
  keycloak_data_dev:
