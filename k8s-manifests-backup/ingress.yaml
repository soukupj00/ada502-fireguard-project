apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fireguard-ingress
  annotations:
    # These annotations keep WebSockets (HiveMQ) alive!
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    # This fixes Keycloak proxy headers
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
spec:
  rules:
    - host: fireguard.local # The local domain we will use
      http:
        paths:
          # 1. FastAPI Backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000

          # 2. Keycloak Auth
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080

          # 3. HiveMQ WebSockets
          - path: /mqtt
            pathType: Prefix
            backend:
              service:
                name: hivemq
                port:
                  number: 8000

          # 4. React Frontend (Must be last so it catches everything else!)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 5173
