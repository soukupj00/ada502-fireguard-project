name: FireGuard CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ------------------------------------------------------------------
  # JOB 0: Secret Scanner
  # ------------------------------------------------------------------
  secret-scan:
    name: Secret Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Scans the whole history of the push
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # JOB 1: BACKEND (FastAPI + uv)
  # ------------------------------------------------------------------
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Dependencies
        # Installs dev dependencies (needed for tests/linting)
        run: uv sync --all-extras --dev

      - name: Run Linter (Ruff)
        # Ruff acts as both Linter (flake8) and Formatter (black)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run Security Scan (Bandit)
        # Installs bandit and runs it against your code (assuming code is in ./src or ./app)
        run: |
          uv pip install bandit
          uv run bandit -r . -x ./.venv,./tests -ll -ii # -ll ignores low severity, -ii ignores low confidence

      - name: Run Tests
        # Runs pytest using the environment created by uv
        run: uv run pytest

      - name: Verify Docker Build
        # Ensures the Dockerfile is valid and the app builds successfully
        run: docker build . -t fireguard-backend:latest

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'fireguard-backend:latest'
          format: 'table'
          exit-code: '1' # Fails the pipeline if critical issues are found
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  #------------------------------------------------
  # Job 2: INTELLIGENCE SYSTEM
  #------------------------------------------------
  intelligence-ci:
    name: Intelligence System CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./intelligence-system

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: Run Linter (Ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run Security Scan (Bandit)
        # Installs bandit and runs it against your code (assuming code is in ./src or ./app)
        run: |
          uv pip install bandit
          uv run bandit -r . -x ./.venv,./tests -ll -ii # -ll ignores low severity, -ii ignores low confidence

      - name: Run Tests
        run: uv run pytest

      - name: Verify Docker Build
        run: docker build . -t fireguard-intelligence:latest

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'fireguard-intelligence:latest'
          format: 'table'
          exit-code: '1' # Fails the pipeline if critical issues are found
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # ------------------------------------------------------------------
  # JOB 3: FRONTEND (React + Vite)
  # ------------------------------------------------------------------
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        # Checks for code quality issues
        run: npm run lint

      - name: Type Check (TypeScript)
        # Verifies no type errors exist
        run: npm run tsc -- --noEmit

      - name: Run Frontend Security Audit
        run: npm audit --audit-level=high

      - name: Build for Production
        # Compiles the React app to static files (dist/)
        run: npm run build

      - name: Build Docker Image
        run: docker build . -t fireguard-frontend:latest

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'fireguard-frontend:latest'
          format: 'table'
          exit-code: '1' # Fails the pipeline if critical issues are found
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # ------------------------------------------------------------------
  # JOB 4: Dynamic Testing with OWASP ZAP
  # ------------------------------------------------------------------
  dast-scan:
    name: OWASP ZAP Dynamic Scan
    needs: [ backend, intelligence-ci, frontend ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 0. Create an empty .env file so Docker Compose doesn't crash
      - name: Create dummy .env
        run: touch .env

      # 1. Spin up your backend locally inside GitHub Actions
      - name: Start Application locally
        run: docker compose -f docker-compose.yml up -d backend db

      # 2. Wait for FastAPI to be healthy
      - name: Wait for Backend
        run: sleep 15

      # 3. Fire OWASP ZAP at the local container
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8000/api/v1/docs' # Point it at your API or Swagger docs
          fail_action: false # Set to true later once you fix initial warnings!

  # ------------------------------------------------------------------
  # JOB 5: DEPLOY TO NREC KUBERNETES (Only runs on main after CI passes)
  # ------------------------------------------------------------------
  deploy:
    name: Deploy to NREC Kubernetes
    needs: [ backend, intelligence-ci, frontend, dast-scan ] # CRITICAL: Wait for tests to pass
    # Only run this job if the push/merge was specifically to the main branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy manifests and restart workloads via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NREC_HOST }}
          username: ${{ secrets.NREC_USERNAME }}
          key: ${{ secrets.NREC_SSH_KEY }}
          # Apply Kubernetes manifests and refresh deployments to pull latest images.
          script: |
            cd ~/ADA502-FireGuard-Project
            git pull origin main

            # Apply latest Kubernetes manifests (including docs deployment/service/ingress)
            kubectl apply -f k8s-manifests/

            # Restart app deployments so :latest images are pulled again
            kubectl rollout restart deployment/backend
            kubectl rollout restart deployment/frontend
            kubectl rollout restart deployment/intelligence
            kubectl rollout restart deployment/docs

            # Wait for successful rollout of core deployments
            kubectl rollout status deployment/backend --timeout=180s
            kubectl rollout status deployment/frontend --timeout=180s
            kubectl rollout status deployment/intelligence --timeout=180s
            kubectl rollout status deployment/docs --timeout=180s

            # Quick ingress and docs checks
            kubectl get ingress fireguard-ingress -o wide
            kubectl get pods -l app=docs
