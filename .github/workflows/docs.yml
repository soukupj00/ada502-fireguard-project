name: Build and Publish Documentation

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    name: Build Docs
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.deployment_gate.outputs.should_deploy }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Generate frontend API reference
        run: npm run docs:api
        working-directory: ./frontend

      - name: Sync frontend API reference into MkDocs docs tree
        run: |
          mkdir -p docs/frontend/reference
          cp -R frontend/dist/docs/reference/. docs/frontend/reference/

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install docs dependencies
        run: uv sync --project docs

      - name: Build MkDocs site
        id: mkdocs_build
        continue-on-error: true
        run: PYTHONPATH=backend/src:intelligence-system/src uv run --project docs mkdocs build

      - name: Report MkDocs Build Status
        if: always()
        run: |
          if [ "${{ steps.mkdocs_build.outcome }}" == "success" ]; then
            echo "✅ MkDocs documentation site built successfully"
            echo "Pages deployment will proceed on next step"
          else
            echo "⚠️  MkDocs build encountered errors (non-blocking for code deployment)"
            echo "Documentation will not be deployed to GitHub Pages"
            echo "Check workflow logs for build details and fix docstrings/markdown as needed"
          fi

      - name: Configure GitHub Pages
        id: configure_pages
        if: steps.mkdocs_build.outcome == 'success'
        continue-on-error: true
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        id: upload_pages
        if: steps.mkdocs_build.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Decide whether to deploy Pages
        id: deployment_gate
        if: always()
        run: |
          if [ "${{ steps.mkdocs_build.outcome }}" = "success" ] && [ "${{ steps.upload_pages.outcome }}" = "success" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "✅ Pages artifact is available. Deploy job will run."
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Skipping Pages deploy (docs build or artifact upload was not successful)."
          fi

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: docs
    if: needs.docs.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
