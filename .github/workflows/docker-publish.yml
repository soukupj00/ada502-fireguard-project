name: Build and Publish Docker Images

on:
  push:
    branches: [ "main" ] # Runs every time we push to main
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

env:
  REGISTRY: ghcr.io
  # This uses our repository name
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Needed to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub provides this token automatically

      - name: Build and push Backend
        run: |
          docker build -t $IMAGE_PREFIX-backend:latest ./backend
          docker push $IMAGE_PREFIX-backend:latest

      - name: Build and push Frontend
        run: |
          docker build -t $IMAGE_PREFIX-frontend:latest ./frontend
          docker push $IMAGE_PREFIX-frontend:latest

      - name: Build and push Intelligence
        run: |
          docker build -t $IMAGE_PREFIX-intelligence:latest ./intelligence
          docker push $IMAGE_PREFIX-intelligence:latest
