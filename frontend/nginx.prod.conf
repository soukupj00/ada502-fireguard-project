# 1. Define Rate Limiting Zones
# Tracks the actual user IP ($binary_remote_addr).
# api_limit: Allows 5 requests per second.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;
# login_limit: Stricter limit for Auth endpoints (1 request per second) to stop brute-forcing.
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=1r/s;

server {
    listen 80;
    listen 443 ssl;
    server_name _;

    # 1. SSL Configuration
    ssl_certificate /etc/nginx/ssl/cert.crt;
    ssl_certificate_key /etc/nginx/ssl/cert.key;

    # 2. Redirect all plain HTTP traffic to HTTPS
    if ($scheme = http) {
        return 301 https://$host$request_uri;
    }

    # 3. Drop overly large payloads (prevents memory exhaustion from malicious uploads)
    client_max_body_size 10M;

    # 4. Frontend (React static files)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # For React Router: if a file isn't found, fall back to index.html
        try_files $uri $uri/ /index.html;
    }

    location /docs/ {
        proxy_pass http://docs:80/docs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- NEW: ROUTE FOR SECURE WEBSOCKETS (HiveMQ) ---
    location /mqtt {
        proxy_pass http://hivemq:8000/mqtt;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;

        # Keep connections alive for long periods for real-time alerts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 5.1 SSE Stream Endpoint
    location ~ ^/api/v1/users/me/subscriptions/.*/stream$ {
        # Proxy to the backend Docker container
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # --- SSE SPECIFIC CONFIGURATION ---
        # HTTP/1.1 is required for keep-alive connections
        proxy_http_version 1.1;

        # Clear the connection header so it stays open
        proxy_set_header Connection "";

        # Disable buffering entirely for this route
        proxy_buffering off;
        proxy_cache off;

        # Ensure Nginx doesn't close the connection while waiting for the Intelligence System
        proxy_read_timeout 300s;
    }

    # 5.2 Backend API (FastAPI)
    location /api/ {
        # Apply the API rate limit. 'burst=10' allows brief legitimate traffic spikes.
        limit_req zone=api_limit burst=10 nodelay;

        # Proxy to the backend Docker container (assuming service name is 'backend')
        proxy_pass http://backend:8000/api/;

        # Pass the real IP to FastAPI
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 6.1 Keycloak Static Resources (Bypass rate limits using ^~)
    location ^~ /auth/resources/ {
        proxy_pass http://keycloak:8080/auth/resources/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 6.2 Keycloak (Authentication logic)
    location /auth/ {
        # Increased burst to 20 so the initial HTML/API loads don't get falsely blocked
        limit_req zone=login_limit burst=20 nodelay;
        proxy_pass http://keycloak:8080/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}
