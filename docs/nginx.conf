server {
    listen 80;
    server_name _;

    # Serve documentation from /docs path or root /
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Try the request URI, then directory index, then fallback to index.html for SPA
        try_files $uri $uri/ /index.html;
    }

    # Explicitly handle /docs path (for ingress routing)
    location /docs {
        # Permanent redirect to /docs/ for consistency
        rewrite ^/docs$ /docs/ permanent;
    }

    location /docs/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
